version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: python src/ingestion/mock_api.py

  pipeline:
    build: .
    volumes:
      - .:/app
    depends_on:
      - api
    command: >
      sh -c "sleep 5 && 
             python src/etl/orchestrator.py && 
             python src/models/train_models.py && 
             python src/db/db_loader.py"
